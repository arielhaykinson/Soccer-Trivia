/* ---------------- CAREER ROADMAP RENDER ---------------- */
function normalizeGuess(str){
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9 ]/g,'').trim();
}
function guessMatchesPlayer(guess, playerName){
  const ng = normalizeGuess(guess);
  if(ng.length < 2) return false;
  const np = normalizeGuess(playerName);
  if(np === ng) return true;
  const words = np.split(' ');
  if(words.includes(ng)) return true;
  if(ng.length >= 5 && np.includes(ng)) return true;
  return false;
}

function shieldStepHtml(club, year){
  const meta = badgeMeta(club);
  const grad = `linear-gradient(135deg, ${meta.bg} 50%, ${meta.accent || meta.bg} 50%)`;
  const yearHtml = (showCareerYears && year) ? `<div class="club-year">${year}</div>` : '';
  return `<div class="roadmap-step">
      <div class="badge-mini">
        <div class="badge-mini-inner" style="background:${grad}; color:${meta.fg}; text-shadow: 0 0 2px ${badgeOutline(meta)}, 0 0 2px ${badgeOutline(meta)}, 0 0 1px ${badgeOutline(meta)};">${meta.abbr}</div>
      </div>
      <div class="club-name">${club}</div>
      ${yearHtml}
    </div>`;
}

function renderCareer(){
  if(!careerPool.length){ buildCareerPool(); }
  if(!careerPool.length){ drawCareerEmpty(); return; }
  if(careerIdx >= careerPool.length){ buildCareerPool(); }
  if(!careerPool.length){ drawCareerEmpty(); return; }
  careerRevealCount = 1;
  careerLocked = false;
  careerShowMCQ = false;
  showCareerYears = false;
  showCareerPos = false;
  showCareerNat = false;
  drawCareerCard('');
}

function setCareerDifficulty(d){
  if(d === "all"){
    if(careerDiffs.size === 3) return; // already all on
    careerDiffs = new Set(["easy","medium","hard"]);
  } else {
    if(careerDiffs.has(d)){
      if(careerDiffs.size === 1) return; // keep at least one active
      careerDiffs.delete(d);
    } else {
      careerDiffs.add(d);
    }
  }
  buildCareerPool();
  renderCareer();
}

function togglePosHint(){
  showCareerPos = !showCareerPos;
  drawCareerCard('');
}

function toggleCareerNat(){
  showCareerNat = !showCareerNat;
  drawCareerCard('');
}

function careerFlagChip(nat){
  const fb = flagBadgeSVG(21, 14, 13.5, nat, 'careerhint');
  return `<svg viewBox="0 0 42 30" width="42" height="30" style="vertical-align:middle;margin:0 5px;">${fb.markup}</svg>`;
}

function toggleCareerYears(){
  showCareerYears = !showCareerYears;
  drawCareerCard('');
}

function switchToMCQ(){
  careerShowMCQ = true;
  drawCareerCard('');
}

function drawCareerEmpty(){
  const diffRow = buildCareerFilterRows();
  document.getElementById('card').innerHTML = `
    <div><span class="q-num">—</span><span class="category">Career Roadmap</span></div>
    <div class="question">No players match this combination.</div>
    ${diffRow}
    <div class="career-nudge" style="margin-top:18px;">Try a different difficulty or position — for example, there are no goalkeepers in the Easy tier.</div>
  `;
}

function buildCareerFilterRows(){
  const allActive = careerDiffs.size === 3;
  const diffPills = ['all','easy','medium','hard'].map(d => {
    const cnt = d === 'all' ? careerBank.length : careerBank.filter(c => c.diff === d).length;
    const label = d === 'all' ? 'All' : d.charAt(0).toUpperCase() + d.slice(1);
    const active = d === 'all' ? allActive : careerDiffs.has(d);
    return `<button class="diff-pill ${active?'active':''}" onclick="setCareerDifficulty('${d}')">${label} <span class="cnt">${cnt}</span></button>`;
  }).join('');
  return `<div class="diff-row">${diffPills}</div><div class="diff-hint">Tap to combine tiers — e.g. Easy + Medium</div>`;
}

function drawCareerCard(nudge){
  const item = careerPool[careerIdx];
  const revealed = item.path.slice(0, careerRevealCount);
  const revealedYears = item.years ? item.years.slice(0, careerRevealCount) : [];
  const stepsHtml = revealed.map((club, i) => i === 0 ? shieldStepHtml(club, revealedYears[i]) : `<div class="roadmap-arrow">→</div>${shieldStepHtml(club, revealedYears[i])}`).join('');
  const isLastClub = careerRevealCount >= item.path.length;

  const posHintHtml = showCareerPos
    ? `<div class="pos-hint">Position hint: <strong>${item.posLabel}</strong>${item.posLabel.includes('/') ? ' <span class="pos-hint-note">(played multiple positions)</span>' : ''}</div>`
    : '';

  const natHintHtml = (showCareerNat && item.nat)
    ? `<div class="pos-hint">Nationality: ${careerFlagChip(item.nat)}<strong>${item.nat}</strong></div>`
    : '';

  const controlsPanel = `
    <div class="career-controls">
      <div class="career-controls-title">Filters &amp; Display</div>
      ${buildCareerFilterRows()}
      <div class="career-toggles">
        <div class="career-toggle-row">
          <label class="toggle-switch">
            <input type="checkbox" ${showCareerYears ? 'checked' : ''} onchange="toggleCareerYears()">
            <span class="toggle-slider"></span>
          </label>
          <span class="career-toggle-label" onclick="toggleCareerYears()">Years</span>
        </div>
        <div class="career-toggle-row">
          <label class="toggle-switch">
            <input type="checkbox" ${showCareerPos ? 'checked' : ''} onchange="togglePosHint()">
            <span class="toggle-slider"></span>
          </label>
          <span class="career-toggle-label" onclick="togglePosHint()">Position</span>
        </div>
        <div class="career-toggle-row">
          <label class="toggle-switch">
            <input type="checkbox" ${showCareerNat ? 'checked' : ''} onchange="toggleCareerNat()">
            <span class="toggle-slider"></span>
          </label>
          <span class="career-toggle-label" onclick="toggleCareerNat()">Nation</span>
        </div>
      </div>
    </div>`;

  let actionZone;
  if(careerLocked){
    actionZone = `<button class="next-btn show" onclick="nextCareer()">Next Career →</button>`;
  } else if(isLastClub && careerShowMCQ){
    const shuffledChoices = shuffle([...item.choices]);
    const optsHtml = shuffledChoices.map((c)=>`<button class="opt" data-c="${c}" onclick="answerCareerMCQ('${c.replace(/'/g,"\\'")}')">${c}</button>`).join('');
    actionZone = `
      <div class="career-nudge">${nudge}</div>
      <div class="options">${optsHtml}</div>`;
  } else {
    actionZone = `
      <div class="career-input-row">
        <input type="text" id="careerInput" class="career-input" placeholder="Type the player's name..." autocomplete="off" onkeydown="if(event.key==='Enter') submitCareerGuess();">
        <button class="career-submit" onclick="submitCareerGuess()">Guess</button>
      </div>
      <div class="career-nudge">${nudge}</div>
      <div class="career-action-row">
        ${isLastClub
          ? `<button class="career-action-btn" onclick="switchToMCQ()">Switch to Multiple Choice</button><button class="career-action-btn giveup" onclick="giveUpCareer()">Give Up — Reveal Answer</button>`
          : `<button class="career-action-btn" onclick="passCareerClub()">Pass — Show Next Club</button>`
        }
      </div>`;
  }

  const blurbHtml = careerLocked
    ? `<div class="player-blurb"><span class="player-blurb-name">${item.player}</span>${item.blurb}</div>`
    : '';

  document.getElementById('card').innerHTML = `
    <div><span class="q-num">${careerIdx+1}</span><span class="category">Career Roadmap</span><span class="category">${careerRevealCount}/${item.path.length} clubs</span></div>
    <div class="question">${careerLocked ? "Here's the full path:" : "Whose career path is this? Guess from just the club(s) shown so far."}</div>
    <div class="roadmap">${stepsHtml}</div>
    ${posHintHtml}
    ${natHintHtml}
    <div class="feedback" id="feedback"></div>
    ${blurbHtml}
    ${actionZone}
    ${controlsPanel}
    <div class="disclaimer">Paths list major club moves in order; loans and short spells are simplified for clarity. Years mark the approximate start–end of each spell.</div>
  `;

  if(careerLocked){
    const fb = document.getElementById('feedback');
    if(fb) fb.classList.add('show');
  } else if(isLastClub && careerShowMCQ){
    // no input to focus
  } else {
    const input = document.getElementById('careerInput');
    if(input) input.focus();
  }
}

function submitCareerGuess(){
  if(careerLocked) return;
  const input = document.getElementById('careerInput');
  const guess = input ? input.value : '';
  const item = careerPool[careerIdx];

  if(guessMatchesPlayer(guess, item.player)){
    const revealCountAtGuess = careerRevealCount;
    const bonus = Math.max(15, 60 - (revealCountAtGuess - 1) * 15);
    careerLocked = true;
    score += bonus;
    streak += 1;
    careerRevealCount = item.path.length;
    drawCareerCard('');
    const fb = document.getElementById('feedback');
    fb.classList.add('good');
    const clubWord = revealCountAtGuess === 1 ? 'club' : 'clubs';
    fb.textContent = `✅ Correct! That's ${item.player} — solved with ${revealCountAtGuess} ${clubWord} shown, +${bonus} pts.`;
    updateScoreboard();
    showStreakMsg();
    return;
  }

  // wrong guess
  if(careerRevealCount < item.path.length){
    careerRevealCount += 1;
    drawCareerCard(`❌ Not quite — here's the next club.`);
  } else {
    drawCareerCard(`❌ Not quite. That was the last club — try multiple choice, give up, or guess again.`);
  }
}

function answerCareerMCQ(choice){
  if(careerLocked) return;
  const item = careerPool[careerIdx];
  const opts = document.querySelectorAll('.opt');
  opts.forEach(el=>{
    const c = el.getAttribute('data-c');
    el.classList.add('locked');
    if(c===item.player) el.classList.add('correct');
    if(c===choice && choice!==item.player) el.classList.add('wrong');
  });
  careerLocked = true;
  if(choice === item.player){
    score += 15;
    streak += 1;
  } else {
    streak = 0;
  }
  updateScoreboard();
  showStreakMsg();
  setTimeout(() => {
    drawCareerCard('');
    const fb = document.getElementById('feedback');
    if(choice === item.player){
      fb.classList.add('good');
      fb.textContent = `✅ Correct! That's ${item.player} — solved via multiple choice, +15 pts.`;
    } else {
      fb.classList.add('bad');
      fb.textContent = `❌ Not quite. That was ${item.player}.`;
    }
  }, 550);
}

function passCareerClub(){
  if(careerLocked) return;
  const item = careerPool[careerIdx];
  if(careerRevealCount < item.path.length){
    careerRevealCount += 1;
    drawCareerCard('');
  }
}

function giveUpCareer(){
  if(careerLocked) return;
  careerLocked = true;
  streak = 0;
  const item = careerPool[careerIdx];
  careerRevealCount = item.path.length;
  drawCareerCard('');
  const fb = document.getElementById('feedback');
  fb.classList.add('bad');
  fb.textContent = `That was ${item.player}.`;
  updateScoreboard();
  showStreakMsg();
}

function nextCareer(){ careerIdx += 1; renderCareer(); }


function showStreakMsg(){
  const el = document.getElementById('streakMsg');
  if(streak >= 3) el.textContent = `🔥 ${streak} in a row — you're on fire!`;
  else el.textContent = '';
}

  ],
  [

  ]
];

/* Difficulty per puzzle (index-aligned with connectionsBank): guessable attribute sets are easy,
   career-history / overlap-trap / deep-knowledge boards are hard. */
const connectionsDiff = ["easy","easy","medium","hard","hard","hard","medium","hard","medium","medium","easy","medium","easy","medium","hard","hard","medium","medium","easy"];

function buildConnections(){
  const puzzle = connectionsBank[connIdx];
  connSelected = []; connSolvedIdx = []; connMistakes = 0; connOver = false; connShake = []; connMsg = ""; connHintUsed = false;
  connOrder = shuffle(puzzle.reduce((a,g)=>a.concat(g.members), []));
}

function renderConnections(){
  const puzzle = connectionsBank[connIdx];
  let order = [...connSolvedIdx];
  if(connOver){ puzzle.forEach((_,i)=>{ if(order.indexOf(i)<0) order.push(i); }); }
  const rows = order.map(i=>{
    const g = puzzle[i];
    return `<div class="conn-group ${g.color}"><div class="lbl">${g.label}</div><div class="mem">${g.members.join(' · ')}</div></div>`;
  }).join('');

  let grid = '';
  if(!connOver){
    grid = `<div class="conn-grid">` + connOrder.map(nm=>{
      const sel = connSelected.indexOf(nm)>=0 ? ' sel' : '';
      const sh = connShake.indexOf(nm)>=0 ? ' shake' : '';
      const safe = nm.replace(/'/g,"\\'");
      return `<div class="conn-tile${sel}${sh}" onclick="toggleConnTile('${safe}')">${nm}</div>`;
    }).join('') + `</div>`;
  }

  const dots = [0,1,2,3].map(i=>`<span class="conn-dot ${i<connMistakes?'used':''}"></span>`).join('');
  const won = connSolvedIdx.length === 4;

  let controls;
  if(connOver){
    controls = `<button class="next-btn show" onclick="nextConnections()">Next Puzzle →</button>`;
  } else {
    const canSubmit = connSelected.length === 4;
    controls = `<div class="conn-controls">
      <button class="conn-btn" onclick="shuffleConn()">Shuffle</button>
      <button class="conn-btn" onclick="deselectConn()" ${connSelected.length?'':'disabled'}>Deselect</button>
      <button class="conn-btn" onclick="connHint()" ${connHintUsed?'disabled':''}>Hint</button>
      <button class="conn-btn primary" onclick="submitConnGuess()" ${canSubmit?'':'disabled'}>Submit</button>
    </div>`;
  }

  let hintPanel = '';
  if(connHintUsed && !connOver){
    const remaining = puzzle
      .map((g,i)=>({g,i}))
      .filter(o=>connSolvedIdx.indexOf(o.i)<0)
      .map(o=>o.g.label);
    const shuffledLabels = shuffle([...remaining]);
    hintPanel = `<div class="conn-hint">
      <div class="conn-hint-title">The connections to find</div>
      ${shuffledLabels.map(l=>`<div class="conn-hint-row">${l}</div>`).join('')}
    </div>`;
  }

  const heading = connOver
    ? (won ? "Solved it! Here are the four groups:" : "Out of guesses — here's the full board:")
    : "Find four groups of four. Tap four tiles that share a connection, then Submit.";

  document.getElementById('card').innerHTML = `
    <div><span class="q-num">${connCount}</span><span class="category">Team Sheet</span><span class="category">${connSolvedIdx.length}/4 groups</span></div>
    <div class="question">${heading}</div>
    <div class="conn-solved">${rows}</div>
    ${grid}
    ${hintPanel}
    ${connOver ? '' : `<div class="conn-mistakes">Mistakes ${dots}</div>`}
    ${connMsg ? `<div class="conn-msg">${connMsg}</div>` : (connOver ? '' : `<div class="conn-msg"></div>`)}
    ${controls}
    <div class="conn-diff">
      <div class="conn-diff-title">Difficulty</div>
      ${buildConnDiffRows()}
    </div>
  `;
}

function toggleConnTile(nm){
  if(connOver) return;
  connMsg = '';
  const idx = connSelected.indexOf(nm);
  if(idx >= 0) connSelected.splice(idx,1);
  else if(connSelected.length < 4) connSelected.push(nm);
  renderConnections();
}

function shuffleConn(){ if(connOver) return; connOrder = shuffle([...connOrder]); renderConnections(); }
function deselectConn(){ if(connOver) return; connSelected = []; connMsg=''; renderConnections(); }
function connHint(){ if(connOver || connHintUsed) return; connHintUsed = true; connMsg=''; renderConnections(); }

function submitConnGuess(){
  if(connOver || connSelected.length !== 4) return;
  const puzzle = connectionsBank[connIdx];
  let matchIdx = -1;
  puzzle.forEach((g,i)=>{
    if(connSolvedIdx.indexOf(i)<0 && connSelected.every(s=>g.members.indexOf(s)>=0)) matchIdx = i;
  });

  if(matchIdx >= 0){
    connSolvedIdx.push(matchIdx);
    const solvedMembers = puzzle[matchIdx].members;
    connOrder = connOrder.filter(nm=>solvedMembers.indexOf(nm)<0);
    connSelected = [];
    score += 15;
    connMsg = '';
    if(connSolvedIdx.length === 4){
      connOver = true;
      if(connMistakes === 0 && !connHintUsed) score += 15;
      streak += 1;
      updateScoreboard(); showStreakMsg();
    } else {
      updateScoreboard();
    }
    renderConnections();
  } else {
    connMistakes++;
    let oneAway = false;
    puzzle.forEach((g,i)=>{
      if(connSolvedIdx.indexOf(i)<0){
        const inter = connSelected.filter(s=>g.members.indexOf(s)>=0).length;
        if(inter === 3) oneAway = true;
      }
    });
    connShake = [...connSelected];
    if(connMistakes >= 4){
      connOver = true;
      connMsg = "Out of guesses.";
      streak = 0; updateScoreboard();
      renderConnections();
    } else {
      connMsg = oneAway ? "So close — just one away!" : "Not a group. Try again.";
      renderConnections();
      setTimeout(()=>{ connShake = []; renderConnections(); }, 450);
    }
  }
}

function nextConnPuzzle(){
  if(connQueue.length === 0){
    const pool = connectionsDiff
      .map((d,i)=>({d,i}))
      .filter(o=>connDiffs.has(o.d))
      .map(o=>o.i);
    connQueue = shuffle(pool);
    // avoid immediately repeating the puzzle just played
    if(connCount > 0 && connQueue.length > 1 && connQueue[connQueue.length-1] === connIdx){
      connQueue.unshift(connQueue.pop());
    }
  }
  connIdx = connQueue.pop();
  connCount++;
}

function setConnDifficulty(d){
  if(d === "all"){
    if(connDiffs.size === 3) return;
    connDiffs = new Set(["easy","medium","hard"]);
  } else {
    if(connDiffs.has(d)){
      if(connDiffs.size === 1) return; // keep at least one active
      connDiffs.delete(d);
    } else {
      connDiffs.add(d);
    }
  }
  connQueue = [];        // rebuild queue for the new filter
  nextConnPuzzle();
  buildConnections();
  renderConnections();
}

function buildConnDiffRows(){
  const allActive = connDiffs.size === 3;
  const pills = ['all','easy','medium','hard'].map(d => {
    const cnt = d === 'all' ? connectionsDiff.length : connectionsDiff.filter(x=>x===d).length;
    const label = d === 'all' ? 'All' : d.charAt(0).toUpperCase() + d.slice(1);
    const active = d === 'all' ? allActive : connDiffs.has(d);
    return `<button class="diff-pill ${active?'active':''}" onclick="setConnDifficulty('${d}')">${label} <span class="cnt">${cnt}</span></button>`;
  }).join('');
  return `<div class="diff-row">${pills}</div>`;
}

function nextConnections(){
  nextConnPuzzle();
  buildConnections();
  renderConnections();
}

/* ---------------- INIT ---------------- */
updateScoreboard();
switchMode('iq');
</script>
