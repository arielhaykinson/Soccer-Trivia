<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOOTBALL IQ — Match Day Trivia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&family=Barlow+Semi+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch-dark: #081F14;
    --pitch-mid: #0F3322;
    --pitch-line: rgba(245,245,240,0.10);
    --panel: #0D2A1B;
    --panel-raised: #133b26;
    --gold: #F2C94C;
    --gold-dim: #C9A23A;
    --chalk: #F5F5F0;
    --chalk-dim: #B9C6BE;
    --red: #E6484F;
    --green: #52B788;
    --shadow: rgba(0,0,0,0.45);
    --gold-glow: rgba(242,201,76,0.35);
    --floodlight: rgba(180,230,200,0.16);
    --edge: rgba(245,245,240,0.10);
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background:
      radial-gradient(130% 55% at 50% -8%, var(--floodlight), transparent 62%),
      radial-gradient(120% 120% at 50% 42%, transparent 52%, rgba(0,0,0,0.55) 100%),
      repeating-linear-gradient(90deg, var(--pitch-mid) 0px, var(--pitch-mid) 60px, var(--pitch-dark) 60px, var(--pitch-dark) 120px);
    background-attachment: fixed;
    color: var(--chalk);
    font-family: 'Barlow', 'Segoe UI', Arial, sans-serif;
    min-height: 100%;
  }
  .wrap{
    max-width: 900px;
    margin: 0 auto;
    padding: 18px 16px 60px;
  }

  .scoreboard{
    position: relative;
    background: linear-gradient(180deg, #0C2C1B, #06180E);
    border: 1px solid var(--gold-dim);
    border-radius: 14px;
    padding: 16px 20px;
    box-shadow: 0 14px 34px var(--shadow), 0 0 0 1px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 10px;
    flex-wrap: wrap;
    overflow: hidden;
  }
  .scoreboard::before{
    content:'';
    position:absolute; top:0; left:8%; right:8%; height:2px;
    background: linear-gradient(90deg, transparent, var(--gold-glow), transparent);
  }
  .title-block h1{
    margin:0;
    font-family: 'Barlow Condensed', 'Arial Black', sans-serif;
    font-weight: 800;
    letter-spacing: 3.5px;
    font-size: 28px;
    text-transform: uppercase;
    color: var(--chalk);
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
  }
  .title-block h1 span{ color: var(--gold); text-shadow: 0 0 18px var(--gold-glow); }
  .title-block p{
    margin: 3px 0 0;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--chalk-dim);
  }
  .digits{ display:flex; gap: 12px; align-items:center; }
  .digit-cell{
    background: radial-gradient(120% 140% at 50% 0%, #0A2013, #030C06);
    border: 1px solid rgba(242,201,76,0.28);
    border-radius: 8px;
    padding: 7px 14px;
    text-align:center;
    min-width: 66px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.02);
  }
  .digit-cell .num{
    font-family: 'Courier New', monospace;
    font-weight:700;
    font-size: 27px;
    color: var(--gold);
    line-height:1;
    text-shadow: 0 0 12px var(--gold-glow);
  }
  .digit-cell .lbl{
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--chalk-dim);
    text-transform: uppercase;
    margin-top:4px;
  }

  .tabs{ display:flex; flex-wrap:wrap; gap: 8px; margin: 20px 0 16px; }
  .tab{
    flex:1 1 auto; min-width: 120px; text-align:center;
    padding: 12px 8px;
    border-radius: 9px;
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(13,42,27,0.7);
    color: var(--chalk-dim);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 13px;
    cursor:pointer;
    transition: color .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
    user-select:none;
  }
  .tab:hover{ background: var(--panel-raised); color: var(--chalk); }
  .tab.active{
    background: linear-gradient(180deg, var(--panel-raised), #0e2e1d);
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 0 1px rgba(242,201,76,0.25), 0 6px 16px rgba(0,0,0,0.35), inset 0 0 18px rgba(242,201,76,0.06);
  }

  .card{
    background: linear-gradient(180deg, #0F2E1E, var(--panel));
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 16px 40px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    position: relative;
    overflow:hidden;
  }
  .card::before{
    content:'';
    position:absolute; top:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.85;
  }
  .card::after{
    content:'';
    position:absolute; top:0; left:0; right:0; height:120px;
    background: radial-gradient(80% 100% at 50% 0%, rgba(180,230,200,0.06), transparent 70%);
    pointer-events:none;
  }
  .q-num{
    display:inline-flex; align-items:center; justify-content:center;
    width: 36px; height:36px; border-radius: 50%;
    background: radial-gradient(120% 120% at 50% 25%, #F7D46A, var(--gold)); color: #0A2416;
    font-weight:800; font-family: 'Barlow Semi Condensed', Arial; font-size: 16px;
    margin-bottom: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.35), 0 0 16px var(--gold-glow);
  }
  .category{
    display:inline-block; font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--gold-dim);
    border: 1px solid rgba(201,162,58,0.5); border-radius: 20px;
    padding: 3px 10px; margin-left: 8px; vertical-align: middle;
    background: rgba(242,201,76,0.05);
  }
  .question{ font-size: 19px; font-weight: 600; line-height:1.45; margin: 8px 0 20px; color: var(--chalk); animation: fadeUp .32s ease; }
  .options{ display:grid; grid-template-columns: 1fr; gap: 10px; }
  .opt{
    text-align:left;
    background: var(--panel-raised);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--chalk);
    padding: 13px 16px;
    border-radius: 9px;
    font-size: 15px;
    cursor:pointer;
    transition: border-color .14s ease, transform .14s ease, box-shadow .14s ease, background .14s ease;
  }
  .opt:hover:not(.locked){ border-color: var(--gold); transform: translateX(3px); box-shadow: -3px 0 0 0 var(--gold), 0 4px 14px rgba(0,0,0,0.28); }
  .opt.correct{ background: rgba(82,183,136,0.25); border-color: var(--green); color: #bff0d6; font-weight:700; box-shadow: 0 0 16px rgba(82,183,136,0.2); }
  .opt.wrong{ background: rgba(230,72,79,0.2); border-color: var(--red); color: #ffc7c9; font-weight:700; }
  .opt.locked{ cursor: default; }

  @keyframes fadeUp{ from{ opacity:0; transform: translateY(6px); } to{ opacity:1; transform:none; } }

  .feedback{
    margin-top: 16px; padding: 13px 15px; border-radius: 9px;
    font-size: 14px; line-height:1.5; display:none;
  }
  .feedback.show{ display:block; animation: fadeUp .28s ease; }
  .feedback.good{ background: rgba(82,183,136,0.15); border-left: 3px solid var(--green); }
  .feedback.bad{ background: rgba(230,72,79,0.12); border-left: 3px solid var(--red); }

  .next-btn{
    margin-top: 18px; width:100%; padding: 14px;
    background: linear-gradient(180deg, #F7D46A, var(--gold)); color: #0A2416; border:none;
    border-radius: 9px; font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase; font-size: 14px; cursor:pointer; display:none;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3), 0 0 18px var(--gold-glow);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .next-btn.show{ display:block; }
  .next-btn:hover{ box-shadow: 0 8px 22px rgba(0,0,0,0.35), 0 0 26px var(--gold-glow); }
  .next-btn:active{ transform: scale(0.98); }

  .pitch-frame{
    background: radial-gradient(ellipse at 50% 20%, #12492D 0%, #0A2C1A 55%, #06190F 100%);
    border: 1px solid rgba(245,245,240,0.18);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    position: relative;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.45), 0 10px 26px var(--shadow);
  }
  .pitch-frame svg{ display:block; width:100%; height:auto; }

  .clue-list{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px 12px;
    margin: 14px 0;
  }
  .clue-row{
    display:flex; align-items:center; gap: 10px;
    font-size: 13px; padding: 8px 10px;
    background: rgba(0,0,0,0.22); border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .clue-row .badge-mini{
    width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:900; flex:none;
    border: 2px solid rgba(245,245,240,0.6);
  }
  .clue-row .pos-tag{
    font-size: 9px; color: var(--gold-dim); font-weight:700;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .clue-row .club-name{ color: var(--chalk); font-weight:700; line-height:1.25; }

  .reveal-list{
    display:none;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px 14px;
    margin: 14px 0;
  }
  .reveal-list.show{ display:grid; }
  .club-row{
    display:flex; align-items:center; gap: 8px;
    font-size: 12.5px; padding: 6px 8px;
    background: rgba(0,0,0,0.2); border-radius: 6px;
  }
  .club-row .pos{
    background: var(--gold); color:#0A2416; font-weight:900; font-size:10px;
    width:22px; height:22px; border-radius:50%;
    display:flex;align-items:center;justify-content:center; flex:none;
  }
  .club-row .club-name{ color: var(--chalk); font-weight:600; }
  .club-row .player-name{ color: var(--chalk-dim); font-size: 11px; }

  .disclaimer{
    font-size: 10.5px; color: var(--chalk-dim);
    text-align:center; margin-top: 6px; opacity: 0.75; line-height:1.4;
  }
  .roadmap{
    display:flex;
    flex-wrap: wrap;
    align-items:center;
    gap: 4px;
    margin: 6px 0 18px;
    padding: 14px;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
  }
  .roadmap-step{
    display:flex;
    flex-direction: column;
    align-items:center;
    gap: 4px;
    width: 84px;
  }
  .roadmap-step .badge-mini{
    width:42px; height:50px;
    clip-path: polygon(50% 0%, 88% 13%, 88% 48%, 88% 48%, 68% 87%, 50% 100%, 32% 87%, 12% 48%, 12% 13%);
    background: #F5F5F0;
    display:flex; align-items:center; justify-content:center;
    padding: 2px;
  }
  .roadmap-step .badge-mini-inner{
    width:100%; height:100%;
    clip-path: polygon(50% 0%, 88% 13%, 88% 48%, 88% 48%, 68% 87%, 50% 100%, 32% 87%, 12% 48%, 12% 13%);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:900;
  }
  .roadmap-step .club-name{
    font-size: 10.5px;
    text-align:center;
    color: var(--chalk);
    font-weight:600;
    line-height:1.2;
  }
  .roadmap-arrow{
    font-size: 16px;
    color: var(--gold-dim);
    flex: none;
    margin: 0 -2px 20px;
  }

  .career-input-row{
    display:flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .career-input{
    flex: 1;
    background: var(--panel-raised);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--chalk);
    padding: 13px 14px;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
  }
  .career-input:focus{ border-color: var(--gold); }
  .career-submit{
    background: var(--gold);
    color: #0A2416;
    border:none;
    border-radius: 8px;
    padding: 0 20px;
    font-weight: 900;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-size: 13px;
    cursor:pointer;
  }
  .career-action-row{
    display:flex;
    gap: 10px;
    margin-bottom: 4px;
  }
  .career-action-btn{
    flex:1;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    color: var(--chalk-dim);
    padding: 10px;
    border-radius: 8px;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor:pointer;
  }
  .career-action-btn:hover{ border-color: var(--gold-dim); color: var(--chalk); }
  .career-action-btn.giveup{ border-color: rgba(230,72,79,0.5); color: var(--red); }
  .career-action-btn.giveup:hover{ border-color: var(--red); }
  .career-nudge{
    font-size: 12.5px;
    color: var(--chalk-dim);
    text-align:center;
    margin: -6px 0 14px;
    min-height: 16px;
  }

  .diff-row{
    display:flex;
    justify-content:center;
    gap: 6px;
    margin: 2px 0 12px;
  }
  .diff-pill{
    flex: 1;
    max-width: 110px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--chalk-dim);
    padding: 7px 4px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .diff-pill:hover{ border-color: var(--gold-dim); color: var(--chalk); }
  .diff-pill.active{ background: var(--gold); color: #0A2416; border-color: var(--gold); }
  .diff-pill .cnt{ font-size: 9.5px; opacity: 0.7; font-weight: 700; }
  .diff-hint{ text-align:center; font-size: 10.5px; color: var(--chalk-dim); opacity: 0.65; margin-top: 6px; letter-spacing: 0.3px; }

  .career-controls{
    margin: 16px 0 10px;
    padding: 12px 12px 4px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
  }
  .career-controls-title{
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--chalk-dim);
    opacity: 0.7;
    text-align: center;
    margin-bottom: 10px;
  }
  .career-controls .diff-row{ margin: 0 0 4px; }
  .career-controls .diff-hint{ margin: 0 0 10px; }
  .career-toggles{
    display: flex;
    justify-content: center;
    gap: 22px;
    flex-wrap: wrap;
    border-top: 1px solid rgba(255,255,255,0.07);
    padding-top: 10px;
    margin-top: 2px;
  }

  .career-toggle-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 9px;
    margin: 0;
  }
  .pos-hint{
    text-align:center;
    font-size: 13px;
    color: var(--chalk-dim);
    margin: 2px 0 12px;
    padding: 8px 12px;
    background: rgba(212,175,55,0.08);
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 8px;
  }
  .pos-hint strong{ color: var(--gold); font-weight: 800; letter-spacing: 0.3px; }
  .pos-hint-note{ font-size: 11px; font-style: italic; opacity: 0.75; }
  .player-blurb{
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--chalk);
    margin: 4px 0 14px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.04);
    border-left: 3px solid var(--gold);
    border-radius: 6px;
    text-align: left;
  }
  .player-blurb-name{
    display: block;
    color: var(--gold);
    font-weight: 800;
    letter-spacing: 0.3px;
    margin-bottom: 4px;
    font-size: 14px;
  }
  .career-toggle-label{
    font-size: 12.5px;
    color: var(--chalk-dim);
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .toggle-switch{
    position: relative;
    display: inline-block;
    width: 40px;
    height: 22px;
    flex: none;
  }
  .toggle-switch input{
    opacity: 0;
    width: 0;
    height: 0;
  }
  .toggle-slider{
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: rgba(255,255,255,0.15);
    border-radius: 999px;
    transition: background 0.2s;
  }
  .toggle-slider::before{
    content: "";
    position: absolute;
    height: 16px;
    width: 16px;
    left: 3px;
    bottom: 3px;
    background: var(--chalk);
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider{
    background: var(--gold);
  }
  .toggle-switch input:checked + .toggle-slider::before{
    transform: translateX(18px);
    background: #0A2416;
  }
  .roadmap-step .club-year{
    font-size: 9.5px;
    color: var(--gold-dim);
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .hint{
    font-size: 12px; color: var(--chalk-dim); text-align:center;
    margin: -4px 0 14px; font-style: italic;
  }

  .streak-flame{ font-size: 12px; color: var(--gold); text-align:center; margin-top: 10px; min-height: 16px; }

  @media (max-width: 480px){
    .reveal-list{ grid-template-columns: 1fr; }
    .digit-cell{ min-width: 54px; padding: 5px 8px; }
    .digit-cell .num{ font-size: 20px; }
    .title-block h1{ font-size: 20px; letter-spacing: 2px; }
    .iq-tier{ font-size: 32px; }
    .iq-stats{ gap: 18px; }
  }
  /* -------- Ball Knowledge -------- */
  .iq-intro, .iq-result{ text-align:center; padding: 10px 4px 4px; animation: fadeUp .35s ease; }
  .iq-badge{
    width: 68px; height: 68px; border-radius: 50%; margin: 4px auto 14px;
    display:flex; align-items:center; justify-content:center; font-size: 34px;
    background: radial-gradient(120% 120% at 50% 25%, #12492D, #0A2416);
    border: 1px solid var(--gold); box-shadow: 0 0 22px var(--gold-glow), inset 0 2px 6px rgba(0,0,0,0.5);
  }
  .iq-headline{
    margin: 0 0 12px; font-family:'Barlow Condensed', sans-serif; font-weight:800;
    letter-spacing:1px; text-transform:uppercase; font-size: 27px; color: var(--chalk);
    text-shadow: 0 0 18px rgba(0,0,0,0.4);
  }
  .iq-sub{ margin: 0 auto 18px; max-width: 520px; color: var(--chalk-dim); font-size: 15px; line-height:1.6; }
  .iq-best{
    display:inline-block; margin: 0 auto 16px; padding: 7px 14px; border-radius: 20px;
    background: rgba(242,201,76,0.08); border: 1px solid rgba(242,201,76,0.35);
    color: var(--chalk); font-size: 13px;
  }
  .iq-best strong{ color: var(--gold); }
  .iq-start{ max-width: 320px; margin-left:auto; margin-right:auto; }
  .iq-modes{
    display:inline-block; margin-top: 12px; background: transparent; border:none;
    color: var(--chalk-dim); font-size: 13px; text-decoration: underline; cursor:pointer;
    letter-spacing:0.5px;
  }
  .iq-modes:hover{ color: var(--gold); }

  .iq-result-tag{ font-size: 12px; letter-spacing: 2.5px; text-transform:uppercase; color: var(--gold-dim); margin-bottom: 6px; }
  .iq-tier{
    font-family:'Barlow Condensed', sans-serif; font-weight:800; text-transform:uppercase;
    font-size: 40px; line-height:1.05; letter-spacing:1px; color: var(--gold);
    text-shadow: 0 0 26px var(--gold-glow); margin-bottom: 18px;
  }
  .iq-meter{
    height: 12px; border-radius: 8px; background: #071B10; overflow:hidden; max-width: 520px;
    margin: 0 auto 20px; border: 1px solid rgba(255,255,255,0.08); box-shadow: inset 0 1px 4px rgba(0,0,0,0.55);
  }
  .iq-meter-fill{
    height: 100%; width: 0; border-radius: 8px;
    background: linear-gradient(90deg, var(--gold-dim), #F7D46A);
    box-shadow: 0 0 14px var(--gold-glow); transition: width 0.9s cubic-bezier(.2,.7,.2,1);
  }
  .iq-stats{ display:flex; justify-content:center; gap: 26px; margin-bottom: 18px; flex-wrap:wrap; }
  .iq-stat{ display:flex; flex-direction:column; gap: 3px; }
  .iq-stat .n{ font-family:'Barlow Semi Condensed', sans-serif; font-weight:800; font-size: 26px; color: var(--chalk); }
  .iq-stat .l{ font-size: 10.5px; letter-spacing: 1.2px; text-transform:uppercase; color: var(--chalk-dim); }
  .iq-blurb{ max-width: 520px; margin: 0 auto 20px; color: var(--chalk-dim); font-size: 15px; line-height:1.6; }

  .iq-progress{ margin-bottom: 16px; }
  .iq-progress-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 9px; }
  .iq-qcount{ font-family:'Barlow Semi Condensed', sans-serif; font-weight:700; font-size: 15px; color: var(--chalk); letter-spacing:0.5px; }
  .iq-qcount .of{ color: var(--chalk-dim); font-weight:600; }
  .iq-diff-badge{ font-size: 10px; letter-spacing: 1.5px; text-transform:uppercase; padding: 3px 10px; border-radius: 20px; font-weight:700; }
  .iq-diff-badge.easy{ color:#bff0d6; background: rgba(82,183,136,0.16); border:1px solid rgba(82,183,136,0.5); }
  .iq-diff-badge.medium{ color:#F7D46A; background: rgba(242,201,76,0.10); border:1px solid rgba(242,201,76,0.5); }
  .iq-diff-badge.hard{ color:#ffc7c9; background: rgba(230,72,79,0.14); border:1px solid rgba(230,72,79,0.55); }
  .iq-pips{ display:flex; gap: 5px; }
  .iq-pip{ flex:1; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.10); transition: background .2s ease; }
  .iq-pip.done{ background: var(--gold); }
  .iq-pip.current{ background: rgba(242,201,76,0.4); box-shadow: 0 0 8px var(--gold-glow); }
  .iq-path{ display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap: 7px; margin: 4px 0 18px; }
  .iq-path-step{
    display:flex; flex-direction:column; align-items:center; gap:2px;
    background: var(--panel-raised); border:1px solid rgba(255,255,255,0.09);
    border-radius: 8px; padding: 7px 11px;
  }
  .iq-path-club{ font-weight:700; font-size: 13.5px; color: var(--chalk); }
  .iq-path-yr{ font-size: 10px; color: var(--chalk-dim); letter-spacing:0.5px; }
  .iq-path-arrow{ color: var(--gold-dim); font-weight:700; }
  .iq-flagwrap{ display:flex; justify-content:center; margin: 4px 0 18px; }
  .iq-flagwrap svg{ border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 6px 18px rgba(0,0,0,0.4); }

  @media (min-width: 680px){
    /* Fill the wider desktop card instead of stretching single-column content */
    .options{ grid-template-columns: 1fr 1fr; gap: 11px 14px; }
    .clue-list{ grid-template-columns: repeat(3, 1fr); }
    /* Pitches are portrait — cap and centre so they don't tower on wide screens */
    .pitch-frame{ max-width: 460px; margin-left: auto; margin-right: auto; }
    /* Keep the Team Sheet board a tidy centred column with square-ish tiles */
    .conn-solved, .conn-grid, .conn-controls, .conn-diff, .conn-mistakes, .conn-msg, .conn-hint{
      max-width: 600px; margin-left: auto; margin-right: auto;
    }
    /* Larger screens have room — scale content up for presence */
    .card{ padding: 28px 30px; }
    .q-num{ width: 38px; height: 38px; font-size: 17px; }
    .category{ font-size: 11px; padding: 4px 11px; }
    .question{ font-size: 22px; line-height: 1.4; margin-bottom: 22px; }
    .opt{ font-size: 16.5px; padding: 15px 18px; }
    .feedback{ font-size: 15px; padding: 15px 17px; }
    .next-btn{ font-size: 15px; padding: 15px; }
    .tab{ font-size: 14px; padding: 13px 10px; }
    .conn-tile{ font-size: 13px; }
    .conn-btn{ font-size: 13px; padding: 12px 8px; }
    .conn-group .lbl{ font-size: 12.5px; }
    .conn-group .mem{ font-size: 13.5px; }
    .diff-pill{ font-size: 12.5px; padding: 8px 6px; }
    .club-name{ font-size: 13px; }
    .player-blurb{ font-size: 14.5px; }
    .career-input, .career-submit{ font-size: 15.5px; }
  }
  @media (min-width: 900px){
    .question{ font-size: 23px; }
    .opt{ font-size: 17px; }
  }
  @media (prefers-reduced-motion: reduce){
    .opt, .tab, .next-btn{ transition: none; }
    .question, .feedback.show{ animation: none; }
    html,body{ background-attachment: initial; }
  }

  /* ---- Connections ---- */
  .conn-solved{ display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
  .conn-group{ border-radius:8px; padding:9px 12px; text-align:center; color:#0A1A10; }
  .conn-group.yellow{ background:#E7C24A; }
  .conn-group.green{ background:#77C77B; }
  .conn-group.blue{ background:#63A0DE; }
  .conn-group.purple{ background:#AD8EE6; }
  .conn-group .lbl{ font-weight:800; text-transform:uppercase; letter-spacing:0.6px; font-size:11.5px; }
  .conn-group .mem{ font-size:12.5px; font-weight:600; margin-top:2px; }
  .conn-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-bottom:14px; }
  .conn-tile{
    aspect-ratio: 1.3 / 1; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:3px; border-radius:8px;
    background:var(--panel-raised); border:1px solid rgba(255,255,255,0.08);
    color:var(--chalk); font-size:11px; font-weight:700; line-height:1.12;
    cursor:pointer; user-select:none; transition: transform .08s, background .12s, border-color .12s;
    word-break: break-word; hyphens:auto;
  }
  .conn-tile:hover{ border-color:var(--gold-dim); }
  .conn-tile.sel{ background:var(--gold); color:#0A2416; border-color:var(--gold); transform:scale(0.96); }
  .conn-tile.shake{ animation: connshake .42s; }
  @keyframes connshake{ 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-4px)} 40%,80%{transform:translateX(4px)} }
  .conn-mistakes{ display:flex; gap:7px; align-items:center; justify-content:center; margin:2px 0 12px; font-size:11px; color:var(--chalk-dim); text-transform:uppercase; letter-spacing:1px; }
  .conn-dot{ width:11px; height:11px; border-radius:50%; background:var(--chalk-dim); opacity:0.45; transition: all .15s; }
  .conn-dot.used{ background:var(--red); opacity:1; }
  .conn-controls{ display:flex; flex-wrap:wrap; gap:8px; }
  .conn-btn{
    flex:1 1 auto; min-width: 70px; padding:11px 6px; border-radius:8px; border:1px solid rgba(255,255,255,0.18);
    background:var(--panel-raised); color:var(--chalk); font-weight:700;
    text-transform:uppercase; letter-spacing:0.5px; font-size:12px; cursor:pointer; transition: all .12s;
  }
  .conn-btn:hover:not(:disabled){ border-color:var(--gold-dim); }
  .conn-btn.primary{ background:var(--gold); color:#0A2416; border-color:var(--gold); }
  .conn-btn:disabled{ opacity:0.35; cursor:default; }
  .conn-msg{ text-align:center; font-size:13px; font-weight:600; color:var(--gold); margin:2px 0 12px; min-height:16px; }
  .conn-hint{ margin:2px 0 14px; padding:12px 14px; background:rgba(212,175,55,0.08); border:1px solid rgba(212,175,55,0.25); border-radius:10px; }
  .conn-hint-title{ font-size:10px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; color:var(--gold-dim); text-align:center; margin-bottom:8px; }
  .conn-hint-row{ font-size:13px; font-weight:600; color:var(--chalk); text-align:center; padding:3px 0; }
  .conn-diff{ margin-top:16px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.08); }
  .conn-diff-title{ font-size:10px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; color:var(--chalk-dim); opacity:0.7; text-align:center; margin-bottom:9px; }
</style>
</head>

</div>

<script>
/* ---------------- DATA: TRIVIA (hard mode) ---------------- */
const triviaBank = [
  {cat:"Records", diff:"medium", q:"Who scored the only hat-trick ever recorded in a men's World Cup final?", opts:["Pelé","Geoff Hurst","Mario Kempes","Ronaldo"], a:1, exp:"Geoff Hurst scored three goals for England in the 1966 final against West Germany — still the only World Cup final hat-trick."},
  {cat:"Records", diff:"hard", q:"Who scored the fastest hat-trick in men's World Cup history, coming off the bench to net three goals in about seven minutes?", opts:["László Kiss","Oleg Salenko","Just Fontaine","Miroslav Klose"], a:0, exp:"Hungary's László Kiss came on as a substitute against El Salvador in 1982 and scored three goals in roughly seven minutes."},
  {cat:"Records", diff:"hard", q:"Which player holds the record for most goals scored in a single World Cup tournament (13)?", opts:["Ronaldo","Gerd Müller","Just Fontaine","Miroslav Klose"], a:2, exp:"France's Just Fontaine scored 13 goals at the 1958 World Cup, a record that still stands."},
  {cat:"Records", diff:"medium", q:"Who is the all-time leading scorer in men's World Cup history with 16 career goals?", opts:["Miroslav Klose","Pelé","Ronaldo","Just Fontaine"], a:0, exp:"Germany's Miroslav Klose scored 16 goals across four World Cups (2002–2014), surpassing Ronaldo's previous record."},
  {cat:"History", diff:"hard", q:"Which player was the first ever sent off in a men's World Cup final?", opts:["Zinedine Zidane","Pedro Monzón","Marcel Desailly","John Heitinga"], a:1, exp:"Argentina's Pedro Monzón was dismissed in the 1990 final against West Germany, the first of five career final red cards."},
  {cat:"Rules", diff:"medium", q:"The 1992 law change preventing goalkeepers from handling the ball after a deliberate pass from a teammate is commonly known as the:", opts:["Offside law","Back-pass rule","Professional foul law","Advantage rule"], a:1, exp:"The back-pass rule was introduced in 1992 specifically to reduce time-wasting after a wave of slow, defensive football at the 1990 World Cup."},
  {cat:"Rules", diff:"medium", q:"VAR (Video Assistant Referee) was used at a men's FIFA World Cup for the first time at which tournament?", opts:["2014 Brazil","2018 Russia","2010 South Africa","2022 Qatar"], a:1, exp:"VAR made its men's World Cup debut in Russia in 2018, after trials in domestic leagues."},
  {cat:"History", diff:"medium", q:"Who became the first woman to referee a match at a men's FIFA World Cup?", opts:["Bibiana Steinhaus","Stéphanie Frappart","Kateryna Monzul","Salima Mukansanga"], a:1, exp:"France's Stéphanie Frappart took charge of a group-stage match at the 2022 World Cup, a first for a men's tournament."},
  {cat:"Trivia", diff:"medium", q:"The 'Panenka' penalty — a soft chip down the middle — is named after a player who used it to win which major final?", opts:["1974 World Cup final","1976 European Championship final","1982 World Cup final","1998 World Cup final"], a:1, exp:"Czechoslovakia's Antonín Panenka scored the decisive chipped penalty in the 1976 Euro final shootout against West Germany."},
  {cat:"History", diff:"hard", q:"Which nation became the first African team to reach a men's World Cup quarterfinal, in 1990?", opts:["Nigeria","Senegal","Cameroon","Ghana"], a:2, exp:"Cameroon's run to the 1990 quarterfinals, including a famous win over defending champions Argentina, was a first for African football."},
  {cat:"Records", diff:"hard", q:"Which World Cup final was the first ever decided by a penalty shootout?", opts:["1990 (West Germany vs Argentina)","1994 (Brazil vs Italy)","1998 (France vs Brazil)","2006 (Italy vs France)"], a:1, exp:"The scoreless 1994 final between Brazil and Italy went to penalties, which Brazil won 3–2."},
  {cat:"Records", diff:"hard", q:"Who scored the fastest goal in men's World Cup history, netting in just 11 seconds?", opts:["Hakan Şükür","Bryan Robson","Václav Mašek","Christian Vieri"], a:0, exp:"Turkey's Hakan Şükür scored after 11 seconds against South Korea in the 2002 third-place match."},
  {cat:"Trivia", diff:"medium", q:"How many teams competed at the 2026 FIFA World Cup, the first edition of the newly expanded format?", opts:["32","40","48","56"], a:2, exp:"The tournament expanded to 48 teams for 2026, hosted jointly by the United States, Mexico, and Canada."},
  {cat:"Rules", diff:"hard", q:"UEFA abolished the away-goals rule for two-legged knockout ties starting in which year?", opts:["2018","2021","2015","2023"], a:1, exp:"UEFA scrapped the decades-old away-goals tiebreaker from the 2021–22 season onward, citing its unintended tactical bias."},
  {cat:"Rules", diff:"medium", q:"Since the 2022 World Cup expansion, how many players can a nation name in its official World Cup squad?", opts:["23","25","26","28"], a:2, exp:"Squad size was expanded from 23 to 26 players starting with the 2022 tournament."},
  {cat:"Trivia", diff:"medium", q:"In the offside law, a player level with the second-to-last opponent is considered:", opts:["Offside","Onside","Subject to referee discretion","Only onside in their own half"], a:1, exp:"A player is only offside if they are nearer to the goal line than both the ball and the second-to-last opponent — being level means onside."},
  {cat:"Records", diff:"medium", q:"Which club has won the most European Cup / UEFA Champions League titles overall?", opts:["AC Milan","Bayern Munich","Liverpool","Real Madrid"], a:3, exp:"Real Madrid's haul of European Cup and Champions League titles is well clear of any other club."},
  {cat:"Records", diff:"hard", q:"Cristiano Ronaldo's record of 17 goals in a single UEFA Champions League campaign came in which season?", opts:["2011–12","2013–14","2016–17","2019–20"], a:1, exp:"Ronaldo scored 17 Champions League goals for Real Madrid in the 2013–14 season, the competition's single-season record."},
  {cat:"History", diff:"medium", q:"Diego Maradona's 'Hand of God' and 'Goal of the Century' both came in the same match, against which team, at the 1986 World Cup?", opts:["Belgium","West Germany","England","Italy"], a:2, exp:"Both goals came in Argentina's 2–1 quarterfinal win over England in 1986, minutes apart."},
  {cat:"Trivia", diff:"easy", q:"What footballing term describes playing the ball through an opponent's legs?", opts:["Rabona","Nutmeg","Panenka","Cruyff turn"], a:1, exp:"A 'nutmeg' is when the ball is played between an opponent's legs, often considered a small humiliation on the pitch."},
  {cat:"History", diff:"hard", q:"Which is the oldest international continental football competition still contested today, founded in 1916?", opts:["UEFA European Championship","Copa América","AFC Asian Cup","Africa Cup of Nations"], a:1, exp:"South America's Copa América dates back to 1916, predating both the Euros and the Asian Cup by decades."},
  {cat:"Rules", diff:"hard", q:"League standings worldwide widely adopted three points for a win (instead of two) mainly during which decade?", opts:["1970s","1980s","1990s","2000s"], a:2, exp:"England adopted three points for a win in 1981, but most major leagues and FIFA only made it standard globally through the 1990s."},
  {cat:"Records", diff:"hard", q:"Which competition introduced Financial Fair Play regulations for clubs in 2011?", opts:["FIFA","UEFA","The Premier League","La Liga"], a:1, exp:"UEFA introduced its Financial Fair Play rules in 2011 to curb club overspending relative to revenue."},
  {cat:"Trivia", diff:"medium", q:"Which country co-hosted the first men's World Cup held in Asia, in 2002?", opts:["China and Thailand","Japan and South Korea","India and Qatar","Malaysia and Singapore"], a:1, exp:"Japan and South Korea jointly hosted the 2002 World Cup, the first ever staged in Asia and the first with co-hosts."},
  {cat:"Tactics", diff:"medium", q:"In football tactics, what is the primary defensive job of a 'libero' or sweeper?", opts:["Marking the opposing striker man-for-man", "Covering the space behind the last line of defenders", "Starting attacks exclusively from midfield", "Taking all set pieces"], a:1, exp:"A sweeper plays free behind the back line, ready to clear anything that slips past the defenders rather than marking a specific man."},
  {cat:"History", diff:"hard", q:"Which club won South America's Copa Libertadores more times than any other, a record that still stands?", opts:["Boca Juniors","River Plate","Independiente","Peñarol"], a:2, exp:"Independiente of Argentina holds the record for most Copa Libertadores titles among all clubs."},
  {cat:"Trivia", diff:"easy", q:"What is the maximum number of substitutions a team may typically make in 90 minutes under the current 'five substitutions' rule, not counting a potential concussion substitute?", opts:["3","4","5","6"], a:2, exp:"Most major competitions permit five substitutions per team within the standard 90 minutes, a rule made permanent after its pandemic-era trial."},
  {cat:"Records", diff:"hard", q:"Who holds the record for most appearances in men's World Cup tournaments, having played in five different editions as an outfield player or keeper?", opts:["Lothar Matthäus","Antonio Carbajal","Rafael Márquez","All of these played in five"], a:3, exp:"Matthäus, Carbajal, Márquez (and others such as Messi and Ronaldo) have each featured in five World Cups — a shared record at the top."},
  {cat:"History", diff:"hard", q:"Which nation won the first ever European Championship, held in 1960?", opts:["Spain","Soviet Union","Yugoslavia","Italy"], a:1, exp:"The Soviet Union beat Yugoslavia in the final to win the inaugural 1960 European Championship."},
  {cat:"Records", diff:"hard", q:"Which goalkeeper is famous for the record of the longest unbeaten run without conceding, set in Serie A?", opts:["Gianluigi Buffon","Dino Zoff","Sebastiano Rossi","Walter Zenga"], a:0, exp:"Gianluigi Buffon set a Serie A record of over 970 minutes without conceding during the 2015–16 season."},
  {cat:"Tactics", diff:"medium", q:"What does the term 'gegenpressing' describe?", opts:["Defending deep in a low block","Winning the ball back immediately after losing it","Playing long balls to a target man","Time-wasting near the corner flag"], a:1, exp:"Gegenpressing, popularized by managers like Jürgen Klopp, means counter-pressing to regain possession right after it's lost, high up the pitch."},
  {cat:"Trivia", diff:"medium", q:"Which country has appeared in every single men's World Cup finals tournament?", opts:["Germany","Italy","Brazil","Argentina"], a:2, exp:"Brazil is the only nation to have qualified for and played in every World Cup finals since the tournament began in 1930."},
  {cat:"History", diff:"medium", q:"The 'Hand of God' goal was scored by Diego Maradona against which team in 1986?", opts:["England","Belgium","West Germany","Uruguay"], a:0, exp:"Maradona punched the ball into England's net in the 1986 quarter-final, later followed in the same match by his celebrated solo 'Goal of the Century'."},
  {cat:"Records", diff:"medium", q:"Who is the all-time top scorer in men's international football?", opts:["Ali Daei","Cristiano Ronaldo","Lionel Messi","Pelé"], a:1, exp:"Cristiano Ronaldo surpassed Ali Daei's long-standing record to become the leading scorer in men's international history."},
  {cat:"Trivia", diff:"medium", q:"How many players from one team must be on the pitch for a match to legally continue?", opts:["Six","Seven","Eight","Nine"], a:1, exp:"A team must have at least seven players on the field; if it drops below that, the match is abandoned."},
  {cat:"History", diff:"medium", q:"Which club completed the treble of league, domestic cup and European Cup in 1999 with two stoppage-time goals in the final?", opts:["Bayern Munich","Manchester United","Barcelona","Juventus"], a:1, exp:"Manchester United scored twice in injury time to beat Bayern Munich in the 1999 Champions League final, sealing a historic treble."},
  {cat:"Tactics", diff:"medium", q:"A 'false nine' is best described as which of the following?", opts:["A defender who pushes into attack","A striker who drops deep into midfield spaces","A goalkeeper comfortable with his feet","A winger who defends as a full-back"], a:1, exp:"A false nine is a centre-forward who drops into midfield to create space and overloads, rather than staying high as a traditional striker."},
  {cat:"Records", diff:"easy", q:"Which country has won the most men's World Cup titles?", opts:["Germany","Italy","Brazil","Argentina"], a:2, exp:"Brazil has lifted the World Cup five times, more than any other nation."},
  {cat:"Trivia", diff:"hard", q:"In which decade was the back-pass rule (forbidding keepers from handling deliberate passes from teammates) introduced?", opts:["1970s","1980s","1990s","2000s"], a:2, exp:"The back-pass rule was introduced in 1992 to discourage time-wasting and encourage more attacking play."},
  {cat:"History", diff:"medium", q:"Leicester City won the Premier League against enormous odds in which season?", opts:["2014–15","2015–16","2016–17","2013–14"], a:1, exp:"Leicester City stunned football by winning the 2015–16 Premier League after starting the season as 5000-1 outsiders."},
  {cat:"Records", diff:"easy", q:"Who won the most Ballon d'Or awards in the men's game?", opts:["Cristiano Ronaldo","Lionel Messi","Michel Platini","Johan Cruyff"], a:1, exp:"Lionel Messi has won the Ballon d'Or a record number of times, more than any other player in history."},
  {cat:"Trivia", diff:"hard", q:"What colour card was introduced to football before the red and yellow card system existed at the World Cup?", opts:["There were no cards before them","Blue cards","Green cards","White cards"], a:0, exp:"Yellow and red cards were introduced at the 1970 World Cup; before that, referees simply spoke to or dismissed players without cards."},
  {cat:"History", diff:"medium", q:"Which country hosted and won the 1998 men's World Cup?", opts:["Italy","France","Spain","Germany"], a:1, exp:"France won the 1998 World Cup on home soil, beating Brazil 3-0 in the final in Paris."},
  {cat:"Tactics", diff:"medium", q:"What is the offside rule primarily designed to prevent?", opts:["Rough tackling","Goal-hanging near the opponent's goal","Time-wasting","Handballs in the box"], a:1, exp:"Offside stops attackers from simply loitering behind the defence to receive passes, keeping play more balanced."},
  {cat:"Records", diff:"medium", q:"Which manager has won the most Champions League / European Cup titles?", opts:["Pep Guardiola","Carlo Ancelotti","Zinedine Zidane","Bob Paisley"], a:1, exp:"Carlo Ancelotti has won the competition a record number of times as a manager, adding to his titles with Milan and Real Madrid."},
  {cat:"Trivia", diff:"easy", q:"How long is the standard half-time interval in professional football?", opts:["10 minutes","15 minutes","20 minutes","5 minutes"], a:1, exp:"The standard half-time break is 15 minutes, as set out in the Laws of the Game."},
  {cat:"History", diff:"medium", q:"Which country won the very first men's FIFA World Cup, held in 1930?", opts:["Uruguay","Brazil","Argentina","Italy"], a:0, exp:"Uruguay hosted and won the inaugural 1930 World Cup, beating Argentina in the final."},
  {cat:"History", diff:"medium", q:"In which country was the 1930 World Cup held?", opts:["Argentina","Uruguay","Brazil","Chile"], a:1, exp:"Uruguay hosted the first World Cup, timed with its centenary of independence."},
  {cat:"Records", diff:"easy", q:"Which player has won the most FIFA World Cup titles as a player?", opts:["Pelé","Cafu","Franz Beckenbauer","Diego Maradona"], a:0, exp:"Pelé won three World Cups with Brazil (1958, 1962, 1970), a record for a player."},
  {cat:"Clubs", diff:"easy", q:"Which English club is nicknamed 'The Red Devils'?", opts:["Liverpool","Manchester United","Arsenal","Manchester City"], a:1, exp:"Manchester United adopted the 'Red Devils' nickname in the 1960s under Matt Busby."},
  {cat:"Clubs", diff:"easy", q:"'La Masia' is the famous youth academy of which club?", opts:["Real Madrid","Barcelona","Ajax","Sporting CP"], a:1, exp:"La Masia is Barcelona's academy, which produced Messi, Xavi, Iniesta and many more."},
  {cat:"Stadiums", diff:"medium", q:"The 'San Siro' stadium is shared by which two clubs?", opts:["Roma and Lazio","Inter and AC Milan","Juventus and Torino","Napoli and Genoa"], a:1, exp:"The San Siro (Giuseppe Meazza) is home to both Inter Milan and AC Milan."},
  {cat:"Stadiums", diff:"easy", q:"'Anfield' is the home stadium of which club?", opts:["Everton","Liverpool","Manchester City","Newcastle"], a:1, exp:"Anfield has been Liverpool's home since 1892, famous for the Kop stand."},
  {cat:"Stadiums", diff:"easy", q:"The 'Bernabéu' stadium belongs to which club?", opts:["Atlético Madrid","Barcelona","Real Madrid","Sevilla"], a:2, exp:"The Santiago Bernabéu is Real Madrid's iconic home in the Spanish capital."},
  {cat:"Rules", diff:"easy", q:"How many players are on the pitch for one team at kickoff?", opts:["10","11","12","9"], a:1, exp:"Each team fields eleven players, including the goalkeeper, at kickoff."},
  {cat:"Rules", diff:"easy", q:"What is the standard duration of a football match, excluding stoppage time?", opts:["80 minutes","90 minutes","100 minutes","120 minutes"], a:1, exp:"A match is two 45-minute halves, totalling 90 minutes before any added time."},
  {cat:"Rules", diff:"easy", q:"How many points are awarded for a win in most modern league systems?", opts:["1","2","3","4"], a:2, exp:"Three points for a win became the global standard to reward attacking play."},
  {cat:"Rules", diff:"easy", q:"What is awarded when a defender handles the ball inside their own penalty area?", opts:["Free kick","Corner","Penalty kick","Throw-in"], a:2, exp:"A deliberate handball in the box results in a penalty kick to the attacking team."},

function badgeMeta(club){
  return clubMeta[club] || {abbr: club.split(" ").map(w=>w[0]).join("").slice(0,3).toUpperCase(), bg:"#2b6f4f", accent:"#1a4530", fg:"#F5F5F0"};
}

/* Perceived luminance (0-255) of a hex color, for choosing a readable text outline. */
function hexLuma(hex){
  if(!hex) return 0;
  let h = hex.replace('#','');
  if(h.length===3) h = h.split('').map(c=>c+c).join('');
  const r = parseInt(h.substr(0,2),16), g = parseInt(h.substr(2,2),16), b = parseInt(h.substr(4,2),16);
  return 0.299*r + 0.587*g + 0.114*b;
}
/* A dark halo for light letters, a light halo for dark letters — keeps the abbr readable
   even where it crosses the two-tone shield (bg + accent halves). */
function badgeOutline(meta){
  return hexLuma(meta.fg) > 150 ? '#0A1A10' : '#F5F5F0';
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

    triviaDiffs = new Set(["easy","medium","hard"]);
  } else {
    if(triviaDiffs.has(d)){
      if(triviaDiffs.size === 1) return; // keep at least one active
      triviaDiffs.delete(d);
    } else {
      triviaDiffs.add(d);
    }
  }
  buildTriviaPool();
  renderTrivia();
}

function buildTriviaDiffRows(){
  const allActive = triviaDiffs.size === 3;
  const pills = ['all','easy','medium','hard'].map(d => {
    const cnt = d === 'all' ? triviaBank.length : triviaBank.filter(q => q.diff === d).length;
    const label = d === 'all' ? 'All' : d.charAt(0).toUpperCase() + d.slice(1);
    const active = d === 'all' ? allActive : triviaDiffs.has(d);
    return `<button class="diff-pill ${active?'active':''}" onclick="setTriviaDifficulty('${d}')">${label} <span class="cnt">${cnt}</span></button>`;
  }).join('');
  return `<div class="diff-row">${pills}</div>`;
}

function renderTrivia(){
  if(triviaIdx >= triviaPool.length){ buildTriviaPool(); }
  const item = triviaPool[triviaIdx];
  locked = false;
  const optsHtml = item.opts.map((o,i)=>`<button class="opt" data-i="${i}" onclick="answerTrivia(${i})">${o}</button>`).join('');

  document.getElementById('card').innerHTML = `
    <div><span class="q-num">${triviaIdx+1}</span><span class="category">${item.cat}</span></div>
    <div class="question">${item.q}</div>
    <div class="options">${optsHtml}</div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextTrivia()">Next Question →</button>
    <div class="conn-diff">
      <div class="conn-diff-title">Difficulty</div>
      ${buildTriviaDiffRows()}
    </div>
  `;
}

function answerTrivia(i){
  if(locked) return;
  locked = true;
  const item = triviaPool[triviaIdx];
  const opts = document.querySelectorAll('.opt');
  opts.forEach((el,idx)=>{
    el.classList.add('locked');
    if(idx===item.a) el.classList.add('correct');
    if(idx===i && i!==item.a) el.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  if(i===item.a){
    score += 15; streak += 1;
    fb.classList.add('good');
    fb.textContent = "✅ Correct! " + item.exp;
  } else {
    streak = 0;
    fb.classList.add('bad');
    fb.textContent = "❌ Not quite. " + item.exp;
  }
  updateScoreboard();
  showStreakMsg();
  document.getElementById('nextBtn').classList.add('show');
}

function nextTrivia(){ triviaIdx += 1; renderTrivia(); }

/* ---------------- BALL KNOWLEDGE (assessment) ---------------- */
const IQ_WEIGHT = { easy: 1, medium: 2, hard: 3 };
let iqQuestions = [], iqIdx = 0, iqCorrect = 0, iqScore = 0, iqMax = 0;
let iqPhase = 'intro', iqLocked = false, iqHardRight = 0, iqHardCount = 0, iqBest = null;

function iqPick(arr, n){ return shuffle([...arr]).slice(0, n); }

function iqNormalize(type, item){
  if(type === 'trivia'){
    return { type:'trivia', diff:item.diff, cat:item.cat, prompt:item.q,
             choices: shuffle([...item.opts]), answer:item.opts[item.a],
             visualHtml:'', exp:item.exp };
  }
  if(type === 'career'){
    const chips = item.path.map(function(cl,i){
      const yr = (item.years && item.years[i]) ? `<span class="iq-path-yr">${item.years[i]}</span>` : '';
      return `<div class="iq-path-step"><span class="iq-path-club">${cl}</span>${yr}</div>`;
    }).join('<span class="iq-path-arrow">→</span>');
    return { type:'career', diff:item.diff, cat:'Career Roadmap',
             prompt:'Which player had this career path?',
             choices: shuffle([...item.choices]), answer:item.player,
             visualHtml:`<div class="iq-path">${chips}</div>`, exp:item.blurb };
  }
  if(type === 'nation'){
    return { type:'nation', diff:'medium', cat:'Name The Nation',
             prompt:'Which national team is this XI?',
             choices: shuffle([...item.choices]), answer:item.country,
             visualHtml:`<div class="pitch-frame">${pitchSVG(item.xi)}</div>`,
             exp:`This is the ${item.country} squad (${item.formation}).` };
  }
  // club
  return { type:'club', diff:'hard', cat:'Name That Club',
           prompt:"Which club is this XI? (the flags show each player's nationality)",
           choices: shuffle([...item.choices]), answer:item.club,
           visualHtml:`<div class="pitch-frame">${flagPitchSVG(item.xi, false)}</div>`,
           exp:`This is the ${item.club} lineup (${item.formation}).` };
}

function iqBuildSet(){
  let set = [];
  // Static trivia (5): a spread of difficulties from the curated bank
  set = set.concat(iqPick(triviaBank.filter(q=>q.diff==='easy'),2).map(x=>iqNormalize('trivia',x)));
  set = set.concat(iqPick(triviaBank.filter(q=>q.diff==='medium'),2).map(x=>iqNormalize('trivia',x)));
  set = set.concat(iqPick(triviaBank.filter(q=>q.diff==='hard'),1).map(x=>iqNormalize('trivia',x)));
  // Dynamically generated data questions (7) — different every time
  set = set.concat(iqGenerated(7));
  // Career paths (4)
  set = set.concat(iqPick(careerBank,4).map(x=>iqNormalize('career',x)));
  // National-team XIs (2) + club XIs (2)
  set = set.concat(iqPick(clubBank,2).map(x=>iqNormalize('nation',x)));
  set = set.concat(iqPick(clubBank2,2).map(x=>iqNormalize('club',x)));
  iqQuestions = shuffle(set);
  iqMax = iqQuestions.reduce((s,q)=> s + IQ_WEIGHT[q.diff], 0);
  iqHardCount = iqQuestions.filter(q=>q.diff==='hard').length;
}

/* ---- Dynamic question generators: build fresh questions from the data ---- */
function iqUniq(arr){ return Array.from(new Set(arr)); }
function iqRand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function iqDistractors(pool, answer, n){
  const opts = shuffle(iqUniq(pool).filter(x => x && x !== answer));
  return opts.slice(0, n);
}
function iqChoices(answer, pool, n){
  return shuffle([answer].concat(iqDistractors(pool, answer, n)));
}

// cached pools built from the live data
let _iqNatPool, _iqPosPool, _iqClubPool, _iqFlagPool, _iqNationTeams, _iqClubTeams;
function iqPools(){
  if(_iqNatPool) return;
  _iqNatPool   = iqUniq(careerBank.map(p=>p.nat));
  _iqPosPool   = iqUniq(careerBank.map(p=>p.posLabel));
  _iqClubPool  = iqUniq([].concat.apply([], careerBank.map(p=>p.path)));
  _iqFlagPool  = Object.keys(FLAGS);
  _iqNationTeams = iqUniq(clubBank.map(e=>e.country));
  _iqClubTeams   = iqUniq(clubBank2.map(e=>e.club));
}

const iqGenerators = [
  function genNationality(){
    const p = iqRand(careerBank);
    return { type:'gen', diff:'easy', cat:'Nationality',
      prompt:`What nationality is ${p.player}?`,
      choices: iqChoices(p.nat, _iqNatPool, 3), answer:p.nat,
      visualHtml:'', exp:`${p.player} represents ${p.nat}.` };
  },
  function genPosition(){
    const p = iqRand(careerBank);
    return { type:'gen', diff:'medium', cat:'Positions',
      prompt:`What is ${p.player}'s main position?`,
      choices: iqChoices(p.posLabel, _iqPosPool, 3), answer:p.posLabel,
      visualHtml:'', exp:`${p.player} is known as a ${p.posLabel.toLowerCase()}.` };
  },
  function genClubYears(){
    const cands = careerBank.filter(p=>p.path.length>=2);
    const p = iqRand(cands);
    const i = Math.floor(Math.random()*p.path.length);
    const answer = p.path[i];
    const pool = _iqClubPool.filter(c => p.path.indexOf(c) < 0);
    return { type:'gen', diff:'medium', cat:'Career Roadmap',
      prompt:`Which club did ${p.player} play for in ${p.years[i]}?`,
      choices: iqChoices(answer, pool, 3), answer:answer,
      visualHtml:'', exp:`${p.player} was at ${answer} (${p.years[i]}).` };
  },
  function genNationTeam(){
    const e = iqRand(clubBank);
    const pl = iqRand(e.xi);
    return { type:'gen', diff:'easy', cat:'Name The Nation',
      prompt:`Which national team does ${pl.player} play for?`,
      choices: iqChoices(e.country, _iqNationTeams, 3), answer:e.country,
      visualHtml:'', exp:`${pl.player} represents ${e.country}.` };
  },
  function genClubTeam(){
    const e = iqRand(clubBank2);
    const pl = iqRand(e.xi);
    return { type:'gen', diff:'medium', cat:'Name That Club',
      prompt:`Which club does ${pl.player} play for?`,
      choices: iqChoices(e.club, _iqClubTeams, 3), answer:e.club,
      visualHtml:'', exp:`${pl.player} plays for ${e.club}.` };
  },
  function genFlag(){
    const c = iqRand(Object.keys(FLAGS));
    return { type:'gen', diff:'medium', cat:'Flags',
      prompt:"Which country's flag is this?",
      choices: iqChoices(c, _iqFlagPool, 3), answer:c,
      visualHtml:`<div class="iq-flagwrap"><svg viewBox="0 0 60 40" width="168" height="112">${FLAGS[c]}</svg></div>`,
      exp:`That's the flag of ${c}.` };
  }
];

function iqGenerated(n){
  iqPools();
  const gens = shuffle([...iqGenerators]);
  const out = []; const seen = {}; let guard = 0;
  while(out.length < n && guard < 80){
    guard++;
    const g = gens[out.length % gens.length];
    const q = g();
    if(!q || seen[q.prompt]) continue;       // avoid a repeated prompt in one test
    if(q.choices.length < 4) continue;        // safety
    seen[q.prompt] = 1;
    out.push(q);
  }
  return out;
}

function startBallKnowledge(){
  iqBuildSet();
  iqIdx = 0; iqCorrect = 0; iqScore = 0; iqHardRight = 0;
  iqLocked = false; iqPhase = 'quiz';
  renderBallKnowledge();
}

function iqVerdict(pct){
  if(pct >= 0.92) return { title:"Ballon d'Or Brain", tag:"World-class", blurb:"Elite. You could hold your own in a live TV studio — encyclopaedic and sharp on the hard ones." };
  if(pct >= 0.80) return { title:"Club Legend", tag:"Outstanding", blurb:"Serious knowledge across eras, competitions and tactics. Very few gaps." };
  if(pct >= 0.68) return { title:"Tactician", tag:"Very good", blurb:"You know the game well beyond the headlines — history and detail both land." };
  if(pct >= 0.55) return { title:"Season Ticket Holder", tag:"Solid", blurb:"A dependable fan's grasp. Strong on the essentials, room to grow on the deep cuts." };
  if(pct >= 0.40) return { title:"Pub Pundit", tag:"Decent", blurb:"You can hold a conversation and win a few arguments — but the trickier stuff trips you up." };
  if(pct >= 0.22) return { title:"Sunday League", tag:"Casual", blurb:"You know the basics. Watch a few more matches and the rest will come." };
  return { title:"Own Goal", tag:"Rookie", blurb:"Early days! Everyone starts somewhere — keep playing and it'll click." };
}

function renderBallKnowledge(){
  const card = document.getElementById('card');

  if(iqPhase === 'intro'){
    const bestHtml = iqBest !== null
      ? `<div class="iq-best">Your best: <strong>${iqBest.title}</strong> · ${iqBest.correct}/${iqBest.total}</div>`
      : '';
    card.innerHTML = `
      <div class="iq-intro">
        <div class="iq-badge">⚽</div>
        <h2 class="iq-headline">What's your Ball Knowledge?</h2>
        <p class="iq-sub">A 20-question test drawn at random from across the whole game — trivia, career paths, national-team XIs and club lineups. Harder questions are worth more. Answer them all and we'll rate your football knowledge.</p>
        ${bestHtml}
        <button class="next-btn show iq-start" onclick="startBallKnowledge()">Start the test →</button>
      </div>`;
    return;
  }

  if(iqPhase === 'result'){
    const pct = iqMax ? iqScore / iqMax : 0;
    const pctDisplay = Math.round(pct * 100);
    const v = iqVerdict(pct);
    const rating = { title: v.title, correct: iqCorrect, total: iqQuestions.length };
    if(iqBest === null || pct > iqBest.pct) iqBest = { title: v.title, correct: iqCorrect, total: iqQuestions.length, pct: pct };
    card.innerHTML = `
      <div class="iq-result">
        <div class="iq-result-tag">${v.tag}</div>
        <div class="iq-tier">${v.title}</div>
        <div class="iq-meter"><div class="iq-meter-fill" style="width:0%"></div></div>
        <div class="iq-stats">
          <div class="iq-stat"><span class="n">${iqCorrect}/${iqQuestions.length}</span><span class="l">Correct</span></div>
          <div class="iq-stat"><span class="n">${pctDisplay}%</span><span class="l">Knowledge score</span></div>
          <div class="iq-stat"><span class="n">${iqHardRight}/${iqHardCount}</span><span class="l">Hard nailed</span></div>
        </div>
        <p class="iq-blurb">${v.blurb}</p>
        <button class="next-btn show iq-start" onclick="startBallKnowledge()">Test me again →</button>
        <button class="conn-btn iq-modes" onclick="switchMode('trivia')">Free-play Trivia instead</button>
      </div>`;
    // animate the meter fill
    const fillEl = card.querySelector('.iq-meter-fill');
    if(fillEl) setTimeout(function(){ fillEl.style.width = pctDisplay + '%'; }, 80);
    return;
  }

  // quiz phase
  const item = iqQuestions[iqIdx];
  iqLocked = false;
  const optsHtml = item.choices.map(function(c){
    const safe = c.replace(/'/g, "\\'");
    const attr = c.replace(/"/g, '&quot;');
    return `<button class="opt" data-c="${attr}" onclick="answerBallKnowledge('${safe}')">${c}</button>`;
  }).join('');
  const pips = iqQuestions.map((q,i)=>{
    let cls = 'iq-pip';
    if(i < iqIdx) cls += ' done';
    else if(i === iqIdx) cls += ' current';
    return `<span class="${cls}"></span>`;
  }).join('');
  const isLast = iqIdx === iqQuestions.length - 1;
  card.innerHTML = `
    <div class="iq-progress">
      <div class="iq-progress-top">
        <span class="iq-qcount">Question ${iqIdx+1} <span class="of">/ ${iqQuestions.length}</span></span>
        <span class="iq-diff-badge ${item.diff}">${item.diff}</span>
      </div>
      <div class="iq-pips">${pips}</div>
    </div>
    <div><span class="category">${item.cat}</span></div>
    ${item.visualHtml || ''}
    <div class="question">${item.prompt}</div>
    <div class="options">${optsHtml}</div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextBallKnowledge()">${isLast ? 'See my verdict →' : 'Next →'}</button>`;
}

function answerBallKnowledge(choiceVal){
  if(iqLocked) return;
  iqLocked = true;
  const item = iqQuestions[iqIdx];
  const btns = document.querySelectorAll('#card .opt');
  btns.forEach(function(b){
    b.classList.add('locked');
    const val = b.dataset.c;
    if(val === item.answer) b.classList.add('correct');
    else if(val === choiceVal) b.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  if(choiceVal === item.answer){
    iqCorrect += 1;
    iqScore += IQ_WEIGHT[item.diff];
    if(item.diff === 'hard') iqHardRight += 1;
    fb.className = 'feedback show good';
    fb.innerHTML = `<strong>Correct.</strong> ${item.exp}`;
  } else {
    fb.className = 'feedback show bad';
    fb.innerHTML = `<strong>${item.answer}.</strong> ${item.exp}`;
  }
  document.getElementById('nextBtn').classList.add('show');
}

function nextBallKnowledge(){
  if(!iqLocked) return; // must answer first
  iqIdx += 1;
  if(iqIdx >= iqQuestions.length){ iqPhase = 'result'; }
  renderBallKnowledge();
}

/* ---------------- CLUB -> NATION RENDER (logo badges only) ---------------- */
function wrapClubName(name, maxChars){
  const words = name.split(' ');
  let lines = [];
  let cur = '';
  words.forEach(w=>{
    const test = (cur ? cur + ' ' + w : w);
    if(test.length <= maxChars){
      cur = test;
    } else {
      if(cur) lines.push(cur);
      cur = w;
    }
  });
  if(cur) lines.push(cur);
  return lines.slice(0,2);
}

function shieldBadgeSVG(x, y, r, meta, uid, abbrSize){
  const s = r / 40;
  const shieldPath = "M50,4 L90,16 L90,58 C90,86 70,104 50,116 C30,104 10,86 10,58 L10,16 Z";
  const clipId = `shield-clip-${uid}`;
  const shieldBottom = r * 1.4;
  return {
    markup: `
      <g transform="translate(${(x-50*s).toFixed(2)},${(y-60*s).toFixed(2)}) scale(${s.toFixed(3)})">
        <clipPath id="${clipId}"><path d="${shieldPath}"/></clipPath>
        <path d="${shieldPath}" fill="${meta.bg}"/>
        <g clip-path="url(#${clipId})">
          <rect x="50" y="0" width="50" height="120" fill="${meta.accent || meta.bg}"/>
        </g>
        <rect x="14" y="32" width="72" height="7" fill="${meta.fg}" opacity="0.22" clip-path="url(#${clipId})"/>
        <circle cx="50" cy="15" r="7" fill="${meta.fg}" opacity="0.92"/>
        <path d="${shieldPath}" fill="none" stroke="#F5F5F0" stroke-width="4"/>
        <text x="50" y="78" font-size="${(abbrSize*40/r).toFixed(1)}" text-anchor="middle" font-weight="900" fill="${meta.fg}" stroke="${badgeOutline(meta)}" stroke-width="${(abbrSize*40/r*0.16).toFixed(2)}" paint-order="stroke" stroke-linejoin="round" font-family="Arial, sans-serif">${meta.abbr}</text>
      </g>`,
    shieldBottom
  };
}

function pitchSVG(xi){
  const groups = {};
  xi.forEach(p=>{ (groups[p.line] = groups[p.line] || []).push(p); });
  const lineKeys = Object.keys(groups).map(Number).sort((a,b)=>b-a); // forwards(5) at top ... GK(1) at bottom
  const n = lineKeys.length;
  const VBW = 392, PITCH_B = 540, VBH = 582;
  const fieldL = 10, fieldW = VBW - 20;
  const topY = 62, bottomY = 500;
  const maxRow = Math.max(...lineKeys.map(k=>groups[k].length));
  const dense = maxRow >= 5;
  const tight = maxRow >= 4;
  const r = dense ? 16 : (tight ? 17.5 : 20);
  const abbrSize = dense ? 8.5 : (tight ? 9 : 10.5);
  const posSize = 8;
  const nameSize = dense ? 8 : (tight ? 8.5 : 9.5);
  const nameLineH = dense ? 9.5 : 11;
  const nameMaxChars = tight ? 12 : 13;

  let badges = '';
  lineKeys.forEach((lk, idx)=>{
    const arr = groups[lk];
    const y = n === 1 ? (topY+bottomY)/2 : topY + idx * ((bottomY - topY) / (n - 1));
    const cnt = arr.length;
    arr.forEach((p,i)=>{
      const x = fieldL + fieldW * (i+1) / (cnt+1);
      const meta = badgeMeta(p.club);
      const lines = wrapClubName(p.club, nameMaxChars);
      const shield = shieldBadgeSVG(x, y, r, meta, `${lk}-${i}`, abbrSize);
      const lineEls = lines.map((line, li) =>
        `<text x="${x}" y="${y+shield.shieldBottom+21+li*nameLineH}" font-size="${nameSize}" text-anchor="middle" fill="#F5F5F0" font-weight="700">${line}</text>`
      ).join('');
      badges += `
        <g>
          ${shield.markup}
          <text x="${x}" y="${y+shield.shieldBottom+9}" font-size="${posSize}" text-anchor="middle" fill="#C9A23A" font-weight="700" letter-spacing="1">${p.pos}</text>
          ${lineEls}
        </g>`;
    });
  });
  const midY = (topY+bottomY)/2;
  return `<svg viewBox="0 0 ${VBW} ${VBH}" xmlns="http://www.w3.org/2000/svg">
    <rect x="${fieldL}" y="10" width="${fieldW}" height="${PITCH_B-20}" fill="none" stroke="#F5F5F0" stroke-opacity="0.2" stroke-width="2"/>
    <circle cx="${VBW/2}" cy="${PITCH_B/2}" r="48" fill="none" stroke="#F5F5F0" stroke-opacity="0.2" stroke-width="2"/>
    <line x1="${fieldL}" y1="${PITCH_B/2}" x2="${VBW-fieldL}" y2="${PITCH_B/2}" stroke="#F5F5F0" stroke-opacity="0.2" stroke-width="2"/>
    <rect x="${(VBW-180)/2}" y="10" width="180" height="58" fill="none" stroke="#F5F5F0" stroke-opacity="0.2" stroke-width="2"/>
    <rect x="${(VBW-180)/2}" y="${PITCH_B-68}" width="180" height="58" fill="none" stroke="#F5F5F0" stroke-opacity="0.2" stroke-width="2"/>
    ${badges}
  </svg>`;
}

function renderClub(){

  const item = clubPool[clubIdx];

    <div><span class="q-num">${clubIdx+1}</span><span class="category">Name The Nation · 2026 World Cup</span><span class="category">${item.formation}</span></div>
    <div class="question">These are the club sides of one nation's 2026 World Cup starting XI — each badge is the club that player turns out for. Which national team is it?</div>
    <div class="pitch-frame">${pitchSVG(item.xi)}</div>
    <div class="options">${optsHtml}</div>
    <div class="feedback" id="feedback"></div>
    <div class="reveal-list" id="revealList">${revealRows}</div>

    <div class="disclaimer">Line-ups reflect each nation's 2026 World Cup squad and are illustrative snapshots of a first-choice XI, not a live team sheet. Badges are custom monogram icons, not official crests.</div>
  `;
}

function answerClub(choice){

/* ---------------- NAME THAT CLUB (flags) RENDER ---------------- */
function flagBadgeSVG(x, y, r, nat, uid){
  const w = r * 2.2, h = r * 1.47;
  const clipId = `flag-clip-${uid}`;
  const inner = FLAGS[nat] || '<rect width="60" height="40" fill="#2b6f4f"/>';
  const bottom = h/2;

  return {
    markup: `
      <g transform="translate(${(x - w/2).toFixed(2)},${(y - h/2).toFixed(2)})">
        <clipPath id="${clipId}"><rect x="0" y="0" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="3"/></clipPath>
        <g clip-path="url(#${clipId})">
          <g transform="scale(${sx},${sy})">${inner}</g>
        </g>
        <rect x="0" y="0" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="none" stroke="#F5F5F0" stroke-width="1.5"/>
      </g>`,
    bottom
  };
}

function flagPitchSVG(xi, reveal){
  const groups = {};
  xi.forEach(p=>{ (groups[p.line] = groups[p.line] || []).push(p); });
  const lineKeys = Object.keys(groups).map(Number).sort((a,b)=>b-a);
  const n = lineKeys.length;
  const VBW = 392, PITCH_B = 540, VBH = 582;
  const fieldL = 10, fieldW = VBW - 20;
  const topY = 62, bottomY = 500;
  const maxRow = Math.max(...lineKeys.map(k=>groups[k].length));
  const dense = maxRow >= 5;
  const tight = maxRow >= 4;
  const r = dense ? 16 : (tight ? 17.5 : 20);
  const posSize = 8;
  const nameSize = dense ? 8 : (tight ? 8.5 : 9.5);
  const nameLineH = dense ? 9.5 : 11;
  const nameMaxChars = tight ? 12 : 13;

  let badges = '';
  lineKeys.forEach((lk, idx)=>{
    const arr = groups[lk];
    const y = n === 1 ? (topY+bottomY)/2 : topY + idx * ((bottomY - topY) / (n - 1));
    const cnt = arr.length;
    arr.forEach((p,i)=>{
      const x = fieldL + fieldW * (i+1) / (cnt+1);
      const flag = flagBadgeSVG(x, y, r, p.nat, `${lk}-${i}`);
      let nameEls = '';
      if(reveal && p.player){
        const lines = wrapClubName(p.player, nameMaxChars);
        nameEls = lines.map((line, li) =>
          `<text x="${x}" y="${y+flag.bottom+22+li*nameLineH}" font-size="${nameSize}" text-anchor="middle" fill="#F5F5F0" font-weight="700">${line}</text>`
        ).join('');
      }
      badges += `
        <g>
          ${flag.markup}
          <text x="${x}" y="${y+flag.bottom+13}" font-size="${posSize}" text-anchor="middle" fill="#C9A23A" font-weight="700" letter-spacing="1">${p.pos}</text>
          ${nameEls}
        </g>`;
    });
  });
  return `<svg viewBox="0 0 ${VBW} ${VBH}" xmlns="http://www.w3.org/2000/svg">
    <rect x="${fieldL}" y="10" width="${fieldW}" height="${PITCH_B-20}" fill="none" stroke="#F5F5F0" stroke-opacity="0.2" stroke-width="2"/>
    <circle cx="${VBW/2}" cy="${PITCH_B/2}" r="48" fill="none" stroke="#F5F5F0" stroke-opacity="0.2" stroke-width="2"/>
    <line x1="${fieldL}" y1="${PITCH_B/2}" x2="${VBW-fieldL}" y2="${PITCH_B/2}" stroke="#F5F5F0" stroke-opacity="0.2" stroke-width="2"/>
    <rect x="${(VBW-180)/2}" y="10" width="180" height="58" fill="none" stroke="#F5F5F0" stroke-opacity="0.2" stroke-width="2"/>
    <rect x="${(VBW-180)/2}" y="${PITCH_B-68}" width="180" height="58" fill="none" stroke="#F5F5F0" stroke-opacity="0.2" stroke-width="2"/>
    ${badges}
  </svg>`;
}

function renderFlags(){
  if(flagIdx >= flagPool.length){ flagPool = shuffle([...clubBank2]); flagIdx = 0; }
  const item = flagPool[flagIdx];
  locked = false;
  const shuffledChoices = shuffle([...item.choices]);

  const revealRows = item.xi.map(p=>
    `<div class="club-row"><div class="pos">${p.pos}</div><div><div class="club-name">${p.nat}</div></div></div>`
  ).join('');

  const optsHtml = shuffledChoices.map((c)=>`<button class="opt" data-c="${c}" onclick="answerFlags('${c.replace(/'/g,"\\'")}')">${c}</button>`).join('');

  document.getElementById('card').innerHTML = `
    <div><span class="q-num">${flagIdx+1}</span><span class="category">Name That Club</span><span class="category">${item.formation}</span></div>
    <div class="question">Each flag shows the nationality of the player in that position. Which club's starting XI is this?</div>
    <div class="pitch-frame" id="flagPitch">${flagPitchSVG(item.xi, false)}</div>
    <div class="options">${optsHtml}</div>
    <div class="feedback" id="feedback"></div>
    <div class="reveal-list" id="revealList">${revealRows}</div>
    <button class="next-btn" id="nextBtn" onclick="nextFlags()">Next Lineup →</button>

function answerFlags(choice){
  if(locked) return;
  locked = true;
  const item = flagPool[flagIdx];
  const opts = document.querySelectorAll('.opt');
  opts.forEach(el=>{
    const c = el.getAttribute('data-c');
    el.classList.add('locked');
    if(c===item.club) el.classList.add('correct');
    if(c===choice && choice!==item.club) el.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  if(choice===item.club){
    score += 20; streak += 1;
    fb.classList.add('good');
    fb.textContent = `✅ Correct! That's ${item.club}.`;
  } else {
    streak = 0;
    fb.classList.add('bad');
    fb.textContent = `❌ Not quite — that lineup belongs to ${item.club}.`;
  }
  document.getElementById('revealList').classList.add('show');
  const pitch = document.getElementById('flagPitch');
  if(pitch) pitch.innerHTML = flagPitchSVG(item.xi, true);
  updateScoreboard();
  showStreakMsg();
  document.getElementById('nextBtn').classList.add('show');
}
